<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- ================= DASHBOARD ================= -->
  <section class="max-w-6xl mx-auto p-4">
    <h1 class="text-3xl font-bold mb-6">Job Application Dashboard</h1>

    <div class="grid md:grid-cols-3 gap-4 mb-8">
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-gray-500">Total Jobs</h2>
        <p id="totalCount" class="text-3xl font-bold">0</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-gray-500">Interview</h2>
        <p id="interviewCount" class="text-3xl font-bold text-green-600">0</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-gray-500">Rejected</h2>
        <p id="rejectedCount" class="text-3xl font-bold text-red-600">0</p>
      </div>
    </div>

    <!-- ================= AVAILABLE JOBS ================= -->
    <div class="bg-white rounded-xl shadow p-6">

      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-semibold">Available Jobs</h2>
        <span id="tabCount" class="text-lg font-bold">8</span>
      </div>

      <!-- Tabs -->
      <div class="flex gap-4 mb-6">
        <button class="tabBtn px-4 py-2 bg-blue-500 text-white rounded" data-tab="all">All</button>
        <button class="tabBtn px-4 py-2 bg-gray-200 rounded" data-tab="interview">Interview</button>
        <button class="tabBtn px-4 py-2 bg-gray-200 rounded" data-tab="rejected">Rejected</button>
      </div>

      <!-- Job Container -->
      <div id="jobContainer" class="grid md:grid-cols-2 gap-6"></div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-12">
        <div class="text-6xl mb-4">📭</div>
        <h3 class="text-xl font-semibold">No Jobs Available</h3>
        <p class="text-gray-500">You haven't added any jobs to this section yet.</p>
      </div>

    </div>
  </section>

    
</body>
</html>
